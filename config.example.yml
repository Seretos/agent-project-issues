# Example project-issues plugin configuration (v1).
#
# Place this file at `.seretos/project-issues.yml` in your project root.
# The loader walks outward by git project boundaries: it checks each
# enclosing repo's `.seretos/` directory, then `~/.seretos/` as the
# user-level fallback.
#
# Token values live in a sibling `.env` file by convention.

version: 1

# Optional — path is resolved relative to this file. When omitted, the
# loader checks `<config-dir>/../.env` and then `<config-dir>/.env`.
# env_file: .env

projects:
  - id: acme-backend
    description: Acme main backend
    provider: github
    # provider-native repo path:
    #   github: "owner/repo"
    #   gitlab: full namespace, e.g. "group/sub/project"
    path: acme/backend
    token_env: GITHUB_TOKEN_ACME
    permissions:
      issues:
        create: true
        modify: true
      pulls:
        create: true
        modify: false
        merge: false

  - id: read-only-gitlab-example
    provider: gitlab
    path: group/sub/project
    # base_url is optional; defaults to https://gitlab.com.
    # base_url: https://gitlab.example.com
    token_env: GITLAB_TOKEN_EXAMPLE
    # All permissions default to false — the project is read-only when
    # the `permissions:` block is omitted entirely.

  - id: acme-ado-frontend
    description: Frontend repo in the acme Azure DevOps project
    provider: azuredevops
    # `path` is `organization/project/repository`. Work items are scoped
    # to `organization/project` (so two YAML entries with the same
    # `organization/project` prefix share their work-item view);
    # pull-requests are scoped to the full three-part path.
    path: acme/frontend-stack/web
    # base_url is optional; defaults to https://dev.azure.com.
    # Set this for Azure DevOps Server (on-prem) installations.
    # base_url: https://devops.acme.internal
    token_env: AZURE_DEVOPS_TOKEN_ACME
    # Optional: which work-item type does `create_ticket` create?
    # When unset the provider discovers a sensible default once per
    # project (Issue → Bug → User Story → Product Backlog Item →
    # Requirement) — covers Basic/Agile/Scrum/CMMI templates.
    # default_work_item_type: Bug
    permissions:
      issues:
        create: true
        modify: true
      pulls:
        create: true
        modify: true
        merge: false
