name: tests

# Runs pytest on every push to any branch and on every PR. Distinct from
# release.yml, which is tag-driven and produces the .exe / release zip.
#
# Matrix: windows-latest + ubuntu-22.04 (multi-OS T5 / ticket #16).
# ubuntu-22.04 is pinned (not ubuntu-latest) so the glibc version
# matches the WSL2 target environment from #10 / #11; building on
# glibc 2.39 (ubuntu-latest today) would produce binaries that fail
# to start under WSL2-Ubuntu-22.04's glibc 2.35.
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      # Keep both branches independent so an OS-specific regression
      # doesn't kill the other branch's diagnostics (plan-comment D1).
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install plugin + test deps
        # pwsh-Core is preinstalled on both windows-latest and
        # ubuntu-22.04 runners, so the shell line is identical for
        # both branches -- no per-OS fork needed.
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run pytest
        shell: pwsh
        run: python -m pytest
