name: release

# Manual multi-OS release flow (ticket #17). Three-job topology:
#
#   stamp (ubuntu-22.04)  -> validates semver, fails on duplicate tag,
#                            stamps pyproject.toml + plugin.json with
#                            the requested version, and uploads the
#                            two manifests as the `stamped-manifests`
#                            artifact for the build matrix to pick up.
#   build (matrix)        -> runs scripts/build.ps1 -Clean on each OS
#                            in the matrix (windows-latest +
#                            ubuntu-22.04). The build script (cross-
#                            platform per #12) emits the per-OS binary
#                            into bin/<os>-x86_64/. Each matrix branch
#                            uploads its bin/ directory as a separate
#                            artifact.
#   release (ubuntu-22.04)-> downloads both bin artifacts + the
#                            stamped manifests, copies the shell-
#                            wrapper pair from release/wrappers/ into
#                            bin/, force-pushes the orphan release
#                            branch, builds the install ZIP with
#                            Unix mode bits stamped on the binaries +
#                            POSIX wrapper, creates the GitHub
#                            Release, and dispatches to the
#                            marketplace.
#
# The 22.04 pin (not ubuntu-latest) matches the WSL2 glibc target
# from #10/#11; ubuntu-latest's glibc 2.39 would emit binaries that
# fail to start on WSL2-Ubuntu-22.04's glibc 2.35.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (semver, no leading v) e.g. 0.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 - Validate, fail-if-tag-exists, stamp manifests
  # ---------------------------------------------------------------------------
  stamp:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    outputs:
      plugin_name: ${{ steps.meta.outputs.plugin_name }}
      tag:         ${{ steps.meta.outputs.tag }}
    steps:
      - name: Validate version is semver
        shell: bash
        run: |
          V="${{ inputs.version }}"
          if [[ ! "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '$V' is not valid semver (expected MAJOR.MINOR.PATCH[-PRERELEASE])."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read plugin metadata + check tag
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PLUGIN_NAME=$(jq -r '.name' .claude-plugin/plugin.json)
          TAG="${PLUGIN_NAME}--v${{ inputs.version }}"
          if gh api "repos/${{ github.repository }}/git/refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists. Delete it first or pick a new version."
            exit 1
          fi
          echo "plugin_name=${PLUGIN_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"                 >> "$GITHUB_OUTPUT"

      - name: Stamp version into pyproject.toml + plugin.json
        # bash + sed/jq per plan-comment D1 = A (POSIX-native, less
        # magic than the previous pwsh regex). The two files are
        # tiny; we re-read after editing to fail loudly if either
        # substitution missed.
        shell: bash
        run: |
          V="${{ inputs.version }}"

          # pyproject.toml — replace the top-level `version = "..."`.
          sed -i -E 's/^(version[[:space:]]*=[[:space:]]*")[^"]*(")/\1'"$V"'\2/' pyproject.toml
          grep -E "^version[[:space:]]*=[[:space:]]*\"$V\"" pyproject.toml \
            || { echo "::error::pyproject.toml stamp failed"; exit 1; }

          # plugin.json — patch via jq for JSON safety.
          tmp=$(mktemp)
          jq --arg v "$V" '.version = $v' .claude-plugin/plugin.json > "$tmp"
          mv "$tmp" .claude-plugin/plugin.json

          STAMPED=$(jq -r '.version' .claude-plugin/plugin.json)
          [ "$STAMPED" = "$V" ] || { echo "::error::plugin.json stamp failed (got $STAMPED)"; exit 1; }
          echo "Stamped version $V into pyproject.toml + plugin.json"

      - name: Upload stamped manifests
        uses: actions/upload-artifact@v4
        with:
          name: stamped-manifests
          path: |
            pyproject.toml
            .claude-plugin/plugin.json

  # ---------------------------------------------------------------------------
  # Job 2 - Cross-OS binary build
  # ---------------------------------------------------------------------------
  build:
    needs: stamp
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: bin-windows
            os-triple: windows-x86_64
            binary: project-issues.exe
          - os: ubuntu-22.04
            artifact-name: bin-linux
            os-triple: linux-x86_64
            binary: project-issues
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download stamped manifests
        # Overrides the on-disk pyproject.toml + plugin.json with the
        # versioned copies from job 1. Without this each matrix
        # branch would otherwise build with the un-stamped 0.0.0
        # version.
        uses: actions/download-artifact@v4
        with:
          name: stamped-manifests
          path: .

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Build binary
        # build.ps1 is cross-platform (ticket #12); $IsWindows guards
        # inside the script handle the OS-specific bits. pwsh-Core is
        # pre-installed on both runners.
        shell: pwsh
        run: ./scripts/build.ps1 -Clean

      - name: Verify binary present
        shell: bash
        run: |
          OUT="bin/${{ matrix.os-triple }}/${{ matrix.binary }}"
          if [ ! -f "$OUT" ]; then
            echo "::error::expected $OUT was not produced"
            ls -la bin/ "bin/${{ matrix.os-triple }}" || true
            exit 1
          fi
          ls -la "$OUT"

      - name: Upload built binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: bin/${{ matrix.os-triple }}/${{ matrix.binary }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 3 - Assemble orphan release branch, build ZIP, publish
  # ---------------------------------------------------------------------------
  release:
    # stamp is in needs: explicitly so the release job can read
    # needs.stamp.outputs.{plugin_name,tag} -- GitHub Actions only
    # propagates job outputs to jobs that declare a direct dependency,
    # so even though `build` transitively depends on `stamp`, that
    # alone leaves needs.stamp.outputs.* empty here.
    needs: [stamp, build]
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download stamped manifests
        uses: actions/download-artifact@v4
        with:
          name: stamped-manifests
          path: .

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: bin-windows
          path: bin/windows-x86_64/

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: bin-linux
          path: bin/linux-x86_64/

      - name: Stage wrappers into bin/
        # Per ticket #13: release/wrappers/project-issues (POSIX) +
        # project-issues.cmd (Windows batch) are versioned in the
        # source tree; the assembly step copies them next to the
        # per-OS binary directories so the plugin.json `command`
        # entry can resolve to bin/project-issues without an
        # extension.
        shell: bash
        run: |
          mkdir -p bin
          cp release/wrappers/project-issues     bin/project-issues
          cp release/wrappers/project-issues.cmd bin/project-issues.cmd
          chmod +x bin/project-issues
          chmod +x bin/windows-x86_64/project-issues.exe
          chmod +x bin/linux-x86_64/project-issues
          echo "=== bin/ contents ==="
          ls -laR bin

      - name: Build install ZIP with Unix mode bits
        # Inline Python zipfile (plan-comment D2 = A — keeps the
        # logic next to the assembly step instead of refactoring
        # build.ps1 to run package-only). The three executables
        # carry 0o755; everything else 0o644. The chmod state on
        # disk (set above) is what unzip honours on Linux.
        shell: bash
        run: |
          V="${{ inputs.version }}"
          STAGE=$(mktemp -d)
          ZIP_NAME="project-issues-plugin-${V}.zip"
          ZIP_PATH="${RUNNER_TEMP}/${ZIP_NAME}"

          cp -a .claude-plugin "$STAGE/"
          cp -a bin             "$STAGE/"
          [ -f README.md ] && cp README.md "$STAGE/"
          [ -f LICENSE   ] && cp LICENSE   "$STAGE/"

          python3 - "$STAGE" "$ZIP_PATH" <<'PYEOF'
          import os, sys, time, zipfile

          stage, zip_path = sys.argv[1], sys.argv[2]

          EXE_ATTR = (0o755 << 16) | 0x8000
          REG_ATTR = (0o644 << 16) | 0x8000

          def is_executable(rel: str) -> bool:
              # The shell wrappers + both PyInstaller binaries.
              if rel == "bin/project-issues":
                  return True
              if rel.startswith("bin/"):
                  leaf = rel.rsplit("/", 1)[-1]
                  if leaf in ("project-issues", "project-issues.exe"):
                      return True
              return False

          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for dirpath, dirnames, filenames in os.walk(stage):
                  dirnames.sort()
                  for name in sorted(filenames):
                      abs_path = os.path.join(dirpath, name)
                      rel = os.path.relpath(abs_path, stage).replace(os.sep, "/")
                      st = os.stat(abs_path)
                      mtime = time.localtime(st.st_mtime)[:6]
                      zi = zipfile.ZipInfo(filename=rel, date_time=mtime)
                      zi.compress_type = zipfile.ZIP_DEFLATED
                      zi.create_system = 3  # Unix
                      zi.external_attr = EXE_ATTR if is_executable(rel) else REG_ATTR
                      with open(abs_path, "rb") as fh:
                          zf.writestr(zi, fh.read())

          print(f"wrote {zip_path} ({os.path.getsize(zip_path)} bytes)")
          PYEOF

          echo "ZIP_PATH=$ZIP_PATH" >> "$GITHUB_ENV"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Force-push orphan release branch
        id: rel
        shell: bash
        run: |
          STAGE_DIR=$(mktemp -d)
          cp -a .claude-plugin "$STAGE_DIR/"
          cp -a bin             "$STAGE_DIR/"
          [ -f README.md ] && cp README.md "$STAGE_DIR/"
          [ -f LICENSE   ] && cp LICENSE   "$STAGE_DIR/"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout --orphan release
          git rm -rf . > /dev/null 2>&1 || true
          git clean -fdx > /dev/null 2>&1 || true

          leftover=$(find . -mindepth 1 -maxdepth 1 -not -name '.git' || true)
          if [ -n "$leftover" ]; then
            echo "::error::working tree not empty after clean:"; echo "$leftover"; exit 1
          fi

          cp -a "$STAGE_DIR"/. .

          # Stamp the POSIX exec bit on the three executables so a
          # Linux clone of the orphan branch yields -rwxr-xr-x rather
          # than 0644 (which causes EACCES when the MCP host tries to
          # spawn the wrapper or its delegate).
          git add bin/windows-x86_64/project-issues.exe \
                  bin/linux-x86_64/project-issues \
                  bin/project-issues
          git update-index --chmod=+x bin/windows-x86_64/project-issues.exe
          git update-index --chmod=+x bin/linux-x86_64/project-issues
          git update-index --chmod=+x bin/project-issues
          # .cmd stays 0644 -- Windows ignores POSIX mode bits.

          git add -A
          git commit -m "release: v${{ inputs.version }}"
          git push origin release --force

          SHA=$(git rev-parse HEAD)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.stamp.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --target "${{ steps.rel.outputs.sha }}" \
            --title "${{ needs.stamp.outputs.tag }}" \
            --generate-notes \
            ${{ contains(inputs.version, '-') && '--prerelease' || '' }} \
            "${{ env.ZIP_PATH }}"

      # The tag we just created via gh/GITHUB_TOKEN does NOT fire
      # push:tags in dispatch.yml -- Actions blocks GITHUB_TOKEN-
      # originated events to prevent recursive workflow loops. So
      # call the marketplace directly from here.
      - name: Dispatch to agent-marketplace
        shell: bash
        env:
          GH_PAT:  ${{ secrets.MARKETPLACE_DISPATCH_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          DESC=$(jq -r '.description' .claude-plugin/plugin.json)
          NAME=$(jq -r '.name'        .claude-plugin/plugin.json)
          TAG="${NAME}--v${VERSION}"
          curl -fsSL -X POST \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Seretos/agent-marketplace/dispatches \
            -d @- <<EOF
          {
            "event_type": "plugin-release",
            "client_payload": {
              "name":        "${NAME}",
              "description": "${DESC}",
              "repo":        "${{ github.repository }}",
              "category":    "mcp",
              "version":     "${VERSION}",
              "ref":         "${TAG}"
            }
          }
          EOF
