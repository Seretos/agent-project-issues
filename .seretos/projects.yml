version: 1

projects:
  - id: agent-project-issues
    description: ""
    provider: github
    path: Seretos/agent-project-issues
    token_env: GITHUB_TOKEN
    permissions:
      issues:
        create: true
        modify: true
      pulls:
        create: true
        modify: true
        merge: false

  - id: lib-python-projects
    description: ""
    provider: github
    path: Seretos/lib-python-projects
    token_env: GITHUB_TOKEN
    permissions:
      issues:
        create: true
        modify: true
      pulls:
        create: false
        modify: false
        merge: false